<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Data Dashboard - Phishing Detection System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
            --border: #e5e7eb;
            --text: #374151;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        header p {
            color: #6b7280;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
        }

        .stat-content h3 {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .stat-content .value {
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-icon {
            font-size: 48px;
            opacity: 0.2;
            color: var(--primary);
        }

        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 30px;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 18px;
            border: none;
            background: white;
            color: #6b7280;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: #f9fafb;
        }

        .tab-btn:hover:not(.active) {
            background: #f3f4f6;
        }

        .content {
            display: none;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .content.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .data-table thead {
            background: var(--light);
            border-bottom: 2px solid var(--border);
        }

        .data-table th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            color: var(--text);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .data-table tbody tr:hover {
            background: var(--light);
        }

        .threat-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .threat-phishing {
            background: #fee2e2;
            color: #991b1b;
        }

        .threat-malicious {
            background: #fecaca;
            color: #7f1d1d;
        }

        .threat-suspicious {
            background: #fef3c7;
            color: #92400e;
        }

        .threat-legitimate {
            background: #dcfce7;
            color: #166534;
        }

        .threat-score {
            font-weight: 700;
            font-size: 15px;
        }

        .score-high {
            color: var(--danger);
        }

        .score-medium {
            color: var(--warning);
        }

        .score-low {
            color: var(--success);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--primary);
        }

        .loading spin {
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0); }
            100% { transform: rotate(360deg); }
        }

        .url-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            word-break: break-all;
        }

        .copy-btn {
            background: var(--light);
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .copy-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .filter-bar input,
        .filter-bar select {
            padding: 10px 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .filter-bar input:focus,
        .filter-bar select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            header {
                padding: 20px;
            }

            header h1 {
                font-size: 24px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                border-bottom: 3px solid var(--border) !important;
                border-right: none;
            }

            .tab-btn.active {
                border-bottom-color: var(--primary);
                border-right: none;
            }

            .content {
                padding: 15px;
            }

            .data-table {
                font-size: 12px;
            }

            .data-table th,
            .data-table td {
                padding: 12px 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="fas fa-database"></i>
                Backend Data Dashboard
            </h1>
            <p>View all your analysis data stored in the backend</p>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="refreshData()">
                    <i class="fas fa-sync"></i>
                    Refresh Data
                </button>
                <button class="btn btn-danger" onclick="clearAllData()">
                    <i class="fas fa-trash"></i>
                    Clear All Data
                </button>
            </div>
        </header>

        <!-- Statistics -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-content">
                    <h3>Email Analyses</h3>
                    <div class="value" id="emailCount">0</div>
                </div>
                <i class="fas fa-envelope stat-icon"></i>
            </div>
            <div class="stat-card">
                <div class="stat-content">
                    <h3>URL Analyses</h3>
                    <div class="value" id="urlCount">0</div>
                </div>
                <i class="fas fa-link stat-icon"></i>
            </div>
            <div class="stat-card">
                <div class="stat-content">
                    <h3>Total Analyses</h3>
                    <div class="value" id="totalCount">0</div>
                </div>
                <i class="fas fa-chart-bar stat-icon"></i>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('all-data')">
                <i class="fas fa-list"></i>
                All Analyses
            </button>
            <button class="tab-btn" onclick="switchTab('emails')">
                <i class="fas fa-envelope"></i>
                Email Analyses
            </button>
            <button class="tab-btn" onclick="switchTab('urls')">
                <i class="fas fa-link"></i>
                URL Analyses
            </button>
            <button class="tab-btn" onclick="switchTab('stats')">
                <i class="fas fa-chart-pie"></i>
                Statistics
            </button>
        </div>

        <!-- All Data Tab -->
        <div class="content active" id="all-data">
            <div id="allDataContent"></div>
        </div>

        <!-- Emails Tab -->
        <div class="content" id="emails">
            <div id="emailsContent"></div>
        </div>

        <!-- URLs Tab -->
        <div class="content" id="urls">
            <div id="urlsContent"></div>
        </div>

        <!-- Stats Tab -->
        <div class="content" id="stats">
            <div id="statsContent"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api';

        // FIXED CWE-79: Add HTML escaping function
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadAllData() {
            try {
                const response = await fetch(`${API_URL}/data/analyses?limit=100`);
                const data = await response.json();
                
                if (data.success) {
                    displayAllData(data.data);
                }
            } catch (error) {
                console.error('Error loading data:', error);
                document.getElementById('allDataContent').innerHTML = '<p style="color: red;">Error loading data. Make sure backend is running.</p>';
            }
        }

        async function loadEmails() {
            try {
                const response = await fetch(`${API_URL}/data/emails?limit=50`);
                const data = await response.json();
                
                if (data.success) {
                    displayEmails(data.data);
                }
            } catch (error) {
                console.error('Error loading emails:', error);
                document.getElementById('emailsContent').innerHTML = '<p style="color: red;">Error loading emails.</p>';
            }
        }

        async function loadURLs() {
            try {
                const response = await fetch(`${API_URL}/data/urls?limit=50`);
                const data = await response.json();
                
                if (data.success) {
                    displayURLs(data.data);
                }
            } catch (error) {
                console.error('Error loading URLs:', error);
                document.getElementById('urlsContent').innerHTML = '<p style="color: red;">Error loading URLs.</p>';
            }
        }

        async function loadStats() {
            try {
                const response = await fetch(`${API_URL}/data/stats`);
                const data = await response.json();
                
                if (data.success) {
                    displayStats(data.data);
                }
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('statsContent').innerHTML = '<p style="color: red;">Error loading statistics.</p>';
            }
        }

        function displayAllData(data) {
            let html = '';
            
            if (!data.items || data.items.length === 0) {
                html = `
                    <div class="no-data">
                        <i class="fas fa-inbox"></i>
                        <p>No analyses yet. Start analyzing emails or URLs from the frontend!</p>
                    </div>
                `;
            } else {
                html = `<table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Type</th>
                            <th>Content</th>
                            <th>Threat Level</th>
                            <th>Score</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                data.items.forEach(item => {
                    const threatBadge = `<span class="threat-badge threat-${item.threatLevel.toLowerCase()}">${item.threatLevel}</span>`;
                    const content = item.category === 'url' 
                        ? `<span class="url-cell" title="${item.url}">${item.url}</span>`
                        : `<span style="max-width: 300px; overflow: hidden; text-overflow: ellipsis; display: block;">${item.content.substring(0, 50)}...</span>`;
                    
                    const scoreClass = item.threatScore > 70 ? 'score-high' : item.threatScore > 40 ? 'score-medium' : 'score-low';
                    
                    html += `<tr>
                        <td>#${item.id}</td>
                        <td><strong>${item.category.toUpperCase()}</strong></td>
                        <td>${content}</td>
                        <td>${threatBadge}</td>
                        <td><span class="threat-score ${scoreClass}">${item.threatScore}</span></td>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                    </tr>`;
                });
                
                html += `</tbody></table>
                    <p style="color: #6b7280; text-align: center; margin-top: 15px;">
                        Showing ${data.items.length} of ${data.totalCount} total analyses
                    </p>`;
            }
            
            document.getElementById('allDataContent').innerHTML = html;
        }

        function displayEmails(data) {
            let html = '';
            
            if (!data.items || data.items.length === 0) {
                html = `
                    <div class="no-data">
                        <i class="fas fa-envelope"></i>
                        <p>No email analyses yet.</p>
                    </div>
                `;
            } else {
                html = `<table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Content Preview</th>
                            <th>Threat Level</th>
                            <th>Score</th>
                            <th>Confidence</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                data.items.forEach(item => {
                    const threatBadge = `<span class="threat-badge threat-${item.threatLevel.toLowerCase()}">${item.threatLevel}</span>`;
                    const scoreClass = item.threatScore > 70 ? 'score-high' : item.threatScore > 40 ? 'score-medium' : 'score-low';
                    
                    html += `<tr>
                        <td>#${item.id}</td>
                        <td>${item.content.substring(0, 80)}...</td>
                        <td>${threatBadge}</td>
                        <td><span class="threat-score ${scoreClass}">${item.threatScore}</span></td>
                        <td>${Math.round(item.confidence.overall * 100)}%</td>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                    </tr>`;
                });
                
                html += `</tbody></table>
                    <p style="color: #6b7280; text-align: center; margin-top: 15px;">
                        Total: ${data.total} email analyses
                    </p>`;
            }
            
            document.getElementById('emailsContent').innerHTML = html;
        }

        function displayURLs(data) {
            let html = '';
            
            if (!data.items || data.items.length === 0) {
                html = `
                    <div class="no-data">
                        <i class="fas fa-link"></i>
                        <p>No URL analyses yet.</p>
                    </div>
                `;
            } else {
                html = `<table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>URL</th>
                            <th>Threat Level</th>
                            <th>Score</th>
                            <th>Confidence</th>
                            <th>Timestamp</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                data.items.forEach(item => {
                    const threatBadge = `<span class="threat-badge threat-${item.threatLevel.toLowerCase()}">${item.threatLevel}</span>`;
                    const scoreClass = item.threatScore > 70 ? 'score-high' : item.threatScore > 40 ? 'score-medium' : 'score-low';
                    
                    html += `<tr>
                        <td>#${item.id}</td>
                        <td><span class="url-cell" title="${item.url}">${item.url}</span></td>
                        <td>${threatBadge}</td>
                        <td><span class="threat-score ${scoreClass}">${item.threatScore}</span></td>
                        <td>${Math.round(item.confidence.overall * 100)}%</td>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                    </tr>`;
                });
                
                html += `</tbody></table>
                    <p style="color: #6b7280; text-align: center; margin-top: 15px;">
                        Total: ${data.total} URL analyses
                    </p>`;
            }
            
            document.getElementById('urlsContent').innerHTML = html;
        }

        function displayStats(stats) {
            const emails = stats.threatDistribution.emails;
            const urls = stats.threatDistribution.urls;
            
            const html = `
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-content">
                            <h3>Total Email Analyses</h3>
                            <div class="value">${stats.emailAnalyses}</div>
                        </div>
                        <i class="fas fa-envelope stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-content">
                            <h3>Total URL Analyses</h3>
                            <div class="value">${stats.urlAnalyses}</div>
                        </div>
                        <i class="fas fa-link stat-icon"></i>
                    </div>
                    <div class="stat-card">
                        <div class="stat-content">
                            <h3>Total Analyses</h3>
                            <div class="value">${stats.totalAnalyses}</div>
                        </div>
                        <i class="fas fa-chart-bar stat-icon"></i>
                    </div>
                </div>
                
                <h3 style="margin-top: 40px; margin-bottom: 20px;">Email Threat Distribution</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Threat Level</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td><span class="threat-badge threat-phishing">Phishing</span></td><td><strong>${emails.phishing}</strong></td></tr>
                        <tr><td><span class="threat-badge threat-malicious">Malicious</span></td><td><strong>${emails.malicious}</strong></td></tr>
                        <tr><td><span class="threat-badge threat-suspicious">Suspicious</span></td><td><strong>${emails.suspicious}</strong></td></tr>
                        <tr><td><span class="threat-badge threat-legitimate">Legitimate</span></td><td><strong>${emails.legitimate}</strong></td></tr>
                    </tbody>
                </table>
                
                <h3 style="margin-top: 40px; margin-bottom: 20px;">URL Threat Distribution</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Threat Level</th>
                            <th>Count</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td><span class="threat-badge threat-malicious">Malicious</span></td><td><strong>${urls.malicious}</strong></td></tr>
                        <tr><td><span class="threat-badge threat-suspicious">Suspicious</span></td><td><strong>${urls.suspicious}</strong></td></tr>
                        <tr><td><span class="threat-badge threat-legitimate">Legitimate</span></td><td><strong>${urls.legitimate}</strong></td></tr>
                    </tbody>
                </table>
            `;
            
            document.getElementById('statsContent').innerHTML = html;
        }

        async function updateStats() {
            try {
                const response = await fetch(`${API_URL}/data/stats`);
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('emailCount').textContent = data.data.emailAnalyses;
                    document.getElementById('urlCount').textContent = data.data.urlAnalyses;
                    document.getElementById('totalCount').textContent = data.data.totalAnalyses;
                }
            } catch (error) {
                console.error('Error updating stats:', error);
            }
        }

        function switchTab(tabName) {
            // Hide all content
            document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            // Load appropriate data
            switch(tabName) {
                case 'all-data':
                    loadAllData();
                    break;
                case 'emails':
                    loadEmails();
                    break;
                case 'urls':
                    loadURLs();
                    break;
                case 'stats':
                    loadStats();
                    break;
            }
        }

        async function refreshData() {
            await updateStats();
            loadAllData();
        }

        function clearAllData() {
            if (confirm('Are you sure you want to clear all backend data? This cannot be undone.')) {
                fetch(`${API_URL}/data/clear`, { method: 'DELETE' })
                    .then(response => response.json())
                    .then(data => {
                        if (data.success) {
                            alert('All data cleared!');
                            refreshData();
                        }
                    })
                    .catch(error => console.error('Error clearing data:', error));
            }
        }

        // Initial load
        window.addEventListener('load', () => {
            updateStats();
            loadAllData();
        });

        // Auto-refresh every 5 seconds
        setInterval(updateStats, 5000);
    </script>
</body>
</html>
